<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回忆录详情</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 详情页特有样式 */
        .memoir-year {
            font-size: 0.72em;
            color: var(--color-text-light);
            margin: 0.2em 0 0;
            font-family: var(--font-sans);
        }

        .memoir-year:empty {
            display: none;
        }

        .memoir-text {
            font-size: 0.94em;
            line-height: 2;
            white-space: pre-wrap;
            max-width: 100%;
        }

        /* 底部工具栏 */
        .detail-toolbar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1em 1.5em;
            background: var(--color-bg);
            border-top: 1px solid var(--color-border);
        }

        .toolbar-inner {
            padding: 10px 16px;
            background: var(--color-bg-dark);
            border-radius: 8px;
        }

        .toolbar-hint {
            font-size: 14px;
            color: var(--color-text-light);
            text-align: left;
            font-family: var(--font-sans);
        }
    </style>
</head>
<body>
    <div class="container inner-page">
        <header class="page-header">
            <button class="btn-back" onclick="goBack()">返回</button>
            <div style="flex:1; text-align:center;">
                <h1 class="header-title" id="memoirTitle">加载中...</h1>
                <p class="memoir-year" id="memoirYear"></p>
            </div>
            <span class="header-spacer"></span>
        </header>

        <main class="page-content">
            <div class="memoir-text" id="memoirContent">加载中...</div>
        </main>

        <footer class="detail-toolbar">
            <div class="toolbar-inner">
                <span class="toolbar-hint">对话记录与重生成已移至管理后台。</span>
            </div>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/memoir-detail.js"></script>
</body>
</html>
