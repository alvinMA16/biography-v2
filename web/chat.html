<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话 - 回忆录</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 结束对话按钮 - 悬浮左上角 */
        .btn-end-chat {
            position: absolute;
            top: 1em;
            left: 1.5em;
            z-index: 10;
            background: none;
            border: 1px solid var(--color-border);
            border-radius: 0;
            font-size: var(--font-size-small);
            color: var(--color-text-light);
            cursor: pointer;
            font-family: var(--font-sans);
            padding: 0.4em 0.8em;
        }
        .btn-end-chat:hover {
            color: var(--color-accent);
            border-color: var(--color-accent);
        }

        .welcome-modal .modal-content {
            max-width: 400px;
            text-align: center;
            padding: 40px 32px;
        }
        .welcome-modal h2 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 16px;
            color: var(--color-text);
        }
        .welcome-modal p {
            font-size: 16px;
            color: var(--color-text-light);
            margin-bottom: 32px;
            line-height: 1.8;
        }
        .welcome-modal .btn {
            min-width: 160px;
        }

        .timeout-actions {
            margin-top: 16px;
            display: none;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .timeout-actions.show {
            display: flex;
        }
        .timeout-actions .btn {
            width: 168px;
            min-height: 56px;
            margin-top: 0;
            padding: 0.7em 1.4em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* 干预调试气泡 - 仅 debug 模式显示 */
        .intervention-container {
            position: fixed;
            right: 16px;
            top: 80px;
            bottom: 80px;
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            pointer-events: none;
            z-index: 100;
        }
        .intervention-bubble {
            background: rgba(59, 130, 246, 0.9);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            animation: slideIn 0.3s ease;
            pointer-events: auto;
        }
        .intervention-bubble.no-intervention {
            background: rgba(107, 114, 128, 0.8);
        }
        .intervention-bubble.intervention-timeout {
            background: rgba(234, 88, 12, 0.9);
        }
        .intervention-bubble .bubble-header {
            font-size: 11px;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        .intervention-bubble .bubble-content {
            word-break: break-word;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* 移动端隐藏干预气泡 */
        @media (max-width: 768px) {
            .intervention-container {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container inner-page">
        <!-- 结束对话按钮 - 悬浮在左上角 -->
        <button class="btn-end-chat" onclick="endChat()">← 结束对话</button>

        <main class="chat-main-stable">
            <!-- AI 说话内容区域 -->
            <div class="ai-content-area">
                <div class="ai-text" id="aiText">正在连接...</div>
            </div>

            <!-- 用户语音输入区域（始终显示） -->
            <div class="user-voice-area">
                <div class="voice-visualizer" id="voiceVisualizer">
                    <div class="voice-bars">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </div>
                </div>
                <p class="voice-status" id="voiceStatus">等待连接</p>
                <div class="timeout-actions" id="timeoutActions">
                    <button class="btn btn-secondary" type="button" id="continueWaitingBtn">继续等待</button>
                    <button class="btn btn-primary" type="button" id="timeoutEndChatBtn">结束对话</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 干预调试气泡容器 - 仅 debug 模式显示 -->
    <div class="intervention-container" id="interventionContainer" style="display: none;"></div>

    <!-- 首次对话完成弹窗 -->
    <div class="modal welcome-modal" id="welcomeModal" style="display: none;">
        <div class="modal-content">
            <h2>很高兴认识您！</h2>
            <p id="welcomeMessage">接下来就可以开始记录您的故事了。</p>
            <button class="btn btn-primary" onclick="goHome()">开始记录</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/realtime-chat.js"></script>
</body>
</html>
